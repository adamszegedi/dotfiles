[main]
# Increased font for 4k readability (effectively 28pt at 2x scaling)
font=monospace:size=14
prompt="󰍉  "
icons-enabled=no

# Geometry adjustments for 4k
# We increase the width and lines to occupy a more commanding space
width=50
lines=12
horizontal-pad=40
vertical-pad=20
inner-pad=10

# Sharp corners
border-width=4
border-radius=0

[colors]
# Kanagawa Palette
background=1f1f28ff
text=dcd7baff
prompt=ffa066ff
input=ffffffff
selection=2d4f67ff
selection-text=7e9cd8ff
border=957fb8ff

[border]
width=4
radius=0
