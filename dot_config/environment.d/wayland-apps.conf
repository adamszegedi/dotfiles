# Wayland-native rendering for common app frameworks
# These are not set automatically by GNOME and improve compatibility
# with Electron, SDL, and Chromium-based apps on Wayland.

OZONE_PLATFORM=wayland
ELECTRON_OZONE_PLATFORM_HINT=wayland
SDL_VIDEODRIVER=wayland

# Cursor size for non-GTK apps (GTK/GNOME inherits from gsettings)
XCURSOR_SIZE=24
