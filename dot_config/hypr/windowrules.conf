##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful
windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}


windowrule = float on, size (monitor_w*0.75) (monitor_h*0.75), match:class ^(com.local.*)$

windowrule = float on, size (monitor_w*0.75) (monitor_h*0.75), match:class ^(org.gnome.Loupe)$

#xdg-desktop-portal-gtk
windowrule = float on, size (monitor_w*0.6) (monitor_h*0.6), match:class ^(xdg-desktop-portal-gtk)$

#Steam
windowrule = fullscreen on, workspace 7, suppress_event fullscreen, content game, match:class ^(steam_app_\d+)$

#No animation for applauncher
layerrule = no_anim on, match:namespace launcher

workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule = border_size 0, rounding 0, match:float 0, match:workspace w[tv1]
windowrule = border_size 0, rounding 0, match:float 0, match:workspace f[1]

#bind workspace to monitor
workspace=1,monitor:$monitor_right
workspace=2,monitor:$monitor_right
workspace=3,monitor:$monitor_right
workspace=4,monitor:$monitor_right
workspace=5,monitor:$monitor_left
workspace=6,monitor:$monitor_left
workspace=7,monitor:$monitor_right
workspace=8,monitor:$monitor_left
workspace=9,monitor:$monitor_right

#Rules
windowrule = workspace 5, match:title ^(Microsoft Teams.*)$
windowrule = workspace 5 silent, match:initial_title Discord
windowrule = workspace 7 silent, match:class steam
windowrule = workspace 9, match:class org.remmina.Remmina
