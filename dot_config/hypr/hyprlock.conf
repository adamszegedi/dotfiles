general {
    no_fade_in = true
    no_fade_out = true
    hide_cursor = true
    grace = 0
    disable_loading = true
}

background {
    monitor =
    color = rgba(40, 40, 40, 1.0)
    path = screenshot
    blur_passes = 3
    blur_size = 8
}

# TIME (Large Monospace)
label {
    monitor = DP-1
    text = $TIME
    color = rgb(212, 190, 152)
    font_size = 120
    font_family = monospace bold
    position = 0, 150
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor = DP-1
    size = 450, 80
    outline_thickness = 4
    dots_size = 0.3
    dots_spacing = 0.3
    dots_center = true

    outer_color = rgb(212, 190, 152)
    inner_color = rgb(40, 40, 40)
    font_color = rgb(212, 190, 152)
    check_color = rgb(125, 174, 163)
    fail_color = rgb(234, 105, 98)

    rounding = 0

    placeholder_text = <span font_family="monospace" size="20000" foreground="##bdae93">Password...</span>

    hide_input = false
    position = 0, -40
    halign = center
    valign = center
}

# USER LABEL
label {
    monitor = DP-1
    text = Hi, $USER
    color = rgb(125, 174, 163)
    font_size = 28
    font_family = monospace
    position = 0, -140
    halign = center
    valign = center
}
