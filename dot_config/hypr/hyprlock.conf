general {
    no_fade_in = true
    no_fade_out = true
    hide_cursor = true
    grace = 0
    disable_loading = true
}

background {
    monitor =
    # SumiInk 1 background
    color = rgba(31, 31, 40, 1.0)
    # This blurs your current screen for a modern-retro look
    path = screenshot
    blur_passes = 3
    blur_size = 8
}

# TIME (Large Monospace)
label {
    monitor = DP-1
    text = $TIME
    color = rgb(220, 215, 186) # OldWhite
    font_size = 120
    font_family = monospace bold
    position = 0, 150
    halign = center
    valign = center
}

# INPUT FIELD (Sharp & High Contrast)
input-field {
    monitor = DP-1
    size = 450, 80
    outline_thickness = 4
    dots_size = 0.3
    dots_spacing = 0.3
    dots_center = true
    
    # Kanagawa Styling
    outer_color = rgb(149, 127, 184) # OniViolet border
    inner_color = rgb(31, 31, 40)    # SumiInk 1 background
    font_color = rgb(220, 215, 186)  # OldWhite text
    check_color = rgb(152, 187, 108) # SpringGreen on success
    fail_color = rgb(195, 64, 67)    # SamuraiRed on failure
    
    # Retro Sharp Edges
    rounding = 0
    
    # Pango markup used to scale the placeholder text
    placeholder_text = <span font_family="monospace" size="20000" foreground="##727169">Password...</span>
    
    hide_input = false
    position = 0, -40
    halign = center
    valign = center
}

# USER LABEL
label {
    monitor = DP-1
    text = Hi, $USER
    color = rgb(255, 160, 102) # SurimiOrange
    font_size = 28
    font_family = monospace
    position = 0, -140
    halign = center
    valign = center
}
