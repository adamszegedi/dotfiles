
################
### MONITORS ###
################

$monitor_right=DP-1
$monitor_left=DP-2
# See https://wiki.hypr.land/Configuring/Monitors/
monitor=$monitor_right,3840x2160@60,0x0,2,vrr,3
monitor=$monitor_left,1920x1080@60,-1920x0,1,vrr,0
monitor=,preferred,auto,auto


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = uwsm app -- ghostty
$fileManager = uwsm app -- ghostty --class=com.local.mc -e mc
$menu = fuzzel "--launch-prefix=uwsm app --"
$dmenu = $HOME/.local/bin/menu.sh


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

source = $HOME/.config/hypr/autostart.conf
source = $HOME/.config/hypr/colors.conf


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

source = $HOME/.config/hypr/env.conf

###################
### PERMISSIONS ###
